<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>究極の選択 - 性格診断</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        h1 { color: #333; font-size: 1.5rem; }
        .choices {
            display: grid;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s, transform 0.1s;
            text-align: left;
            line-height: 1.4;
        }
        .btn:hover { background-color: #0056b3; }
        .btn:active { transform: scale(0.98); }
        
        #result-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
            white-space: pre-wrap; /* 改行を有効にする */
        }
        .result-title { font-size: 1.2rem; color: #d9534f; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>究極の選択</h1>
    <p>あなたのプロフィールとして、最も近い（または選びたい）ものはどれですか？</p>
    
    <div class="choices" id="choice-container">
        <button class="btn" onclick="showResult('A')">
            <strong>A:</strong> 電験一種リロン落ち / 妻あり / 大久保しげちゃん
        </button>
        <button class="btn" onclick="showResult('B')">
            <strong>B:</strong> 毎日非常食生活 / チー牛顔 / ちんこるんるん
        </button>
        <button class="btn" onclick="showResult('C')">
            <strong>C:</strong> 年収２８万 / パパ８人 / ニガ口ゼオン
        </button>
        <button class="btn" onclick="showResult('D')">
            <strong>D:</strong> 見た目に騙されないで / 筋肉バカ / もりいわお
        </button>
    </div>

    <div id="result-area">
        <div class="result-title">【性格診断結果】</div>
        <div id="result-text"></div>
        <button onclick="location.reload()" style="margin-top:20px; cursor:pointer;">もう一度やる</button>
    </div>
</div>

<script>
    const results = {
        'A': "あなたはBLです",
        'B': "あなたはBLです\nセンスがないですね",
        'C': "あなたは国際結婚をするのが好きです",
        'D': "あなたは自宅警備員が良いようですね\nでも言葉に負けないようにしましょう"
    };

    function showResult(key) {
        document.getElementById('choice-container').style.display = 'none';
        const resultArea = document.getElementById('result-area');
        const resultText = document.getElementById('result-text');
        
        resultText.innerText = results[key];
        resultArea.style.display = 'block';
        
        // 結果に合わせて背景色を変える演出
        if(key === 'A' || key === 'B') {
            resultArea.style.backgroundColor = '#fff0f0';
        } else {
            resultArea.style.backgroundColor = '#f0fff0';
        }
    }
</script>

</body>
</html>
