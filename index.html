<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Light Up - Stealth Mode</title>
    <style>
        body {
            background-color: #000; /* 背景は完全な黒 */
            color: #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 電球本体 */
        .bulb {
            width: 100px;
            height: 100px;
            background-color: #000; /* 本体は常に黒（影だけで表現） */
            border-radius: 50%;
            margin-bottom: 50px;
            /* 正解している時だけの光の影 */
            box-shadow: 0 0 calc(var(--bright) * 10px) calc(var(--bright) * 2px) #fffb00;
            transition: box-shadow 0.1s ease;
            border: 1px solid #111; /* 輪郭だけうっすら見えるように */
        }

        /* 間違えた時のスタイル：影を完全になくす */
        .bulb.error {
            box-shadow: none !important;
            border-color: #000; /* 輪郭も消す */
        }

        input {
            background: #0a0a0a;
            border: 1px solid #222;
            color: #fffb00;
            font-size: 24px;
            padding: 10px;
            text-align: center;
            width: 80%;
            max-width: 300px;
            border-radius: 10px;
            outline: none;
            -webkit-user-select: auto; 
            user-select: auto;
        }
        
        input.error-input {
            color: #300; /* 文字もほとんど見えなくする */
            border-color: #1a0000;
        }

        .status {
            margin-top: 20px;
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body style="--bright: 0;">

    <div class="bulb" id="bulb"></div>
    <p>円周率を入力せよ</p>
    
    <input type="number" id="piInput" 
           placeholder="3.1415..." 
           onpaste="return false;" 
           oncontextmenu="return false;" 
           autocomplete="off">

    <div class="status" id="status">Ready</div>

    <script>
        const pi = "3141592653589793238462643383279";
        const inputElement = document.getElementById('piInput');
        const bulb = document.getElementById('bulb');
        const status = document.getElementById('status');

        inputElement.addEventListener('input', (e) => {
            const val = e.target.value.replace('.', '');
            let correctCount = 0;
            let isError = false;

            for (let i = 0; i < val.length; i++) {
                if (val[i] === pi[i]) {
                    correctCount++;
                } else {
                    isError = true;
                    break;
                }
            }

            if (isError) {
                // 間違えたら影を消し、errorクラスを付与
                document.body.style.setProperty('--bright', 0);
                bulb.classList.add('error');
                inputElement.classList.add('error-input');
                status.innerText = "暗黒";
            } else {
                // 正解中は影（光）を強くしていく
                document.body.style.setProperty('--bright', correctCount * 5);
                bulb.classList.remove('error');
                inputElement.classList.remove('error-input');
                status.innerText = `${correctCount} digits`;
            }
        });
    </script>
</body>
</html>
