<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Reflection Images</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 20px;
            pointer-events: none; /* コンテンツエリア以外をタップ可能に */
        }
        
        .content p, .content .status {
            text-shadow: 0 0 5px #000; /* 文字を見やすく */
        }

        input {
            background: #111;
            border: 2px solid #444;
            color: #0f0;
            font-size: 32px;
            padding: 15px;
            text-align: center;
            width: 80%;
            max-width: 320px;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s ease;
            pointer-events: auto; /* inputだけはタップ可能に */
        }

        input.panic {
            color: #ff0000 !important;
            border-color: #ff0000 !important;
            box-shadow: 0 0 20px #ff0000;
            animation: blink 0.2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .status {
            margin-top: 20px;
            font-weight: bold;
            color: #888;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="content">
        <p>円周率を入力せよ。<br>正解数だけ、奴が増える。</p>
        <input type="number" id="piInput" placeholder="3.1415..." onpaste="return false;" autocomplete="off">
        <div class="status" id="status">IMAGES: 0</div>
    </div>

    <script>
        // --- 設定エリア ---
        const pi = "31415926535897932384626433832795028841971693993751";
        const IMAGE_SRC = 'dvd-logo.png'; // ★ここに画像ファイルのパス、またはURLを入れてください
        const IMG_SIZE = 40;        // 画像の表示サイズ（ピクセル）
        // ----------------

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const inputElement = document.getElementById('piInput');
        const status = document.getElementById('status');

        let dots = []; // 名前はdotsのままですが、画像が入ります
        let targetDotCount = 0;
        
        // 画像の読み込み処理
        const myImage = new Image();
        myImage.src = IMAGE_SRC;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 画像インスタンスのクラス
        class MovingImage {
            constructor() {
                this.x = Math.random() * (canvas.width - IMG_SIZE);
                this.y = Math.random() * (canvas.height - IMG_SIZE);
                this.size = IMG_SIZE;
                // スピード（点の時より少し遅く設定）
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;

                // 壁での反射（画像サイズを考慮）
                if (this.x < 0 || this.x > canvas.width - this.size) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height - this.size) this.vy *= -1;
            }
            draw() {
                // 点（arc）の代わりに画像（drawImage）を描画
                if (myImage.complete) { // 画像の読み込みが完了しているか確認
                    ctx.drawImage(myImage, this.x, this.y, this.size, this.size);
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // ドットの増減処理
            if (dots.length < targetDotCount) {
                dots.push(new MovingImage());
            } else if (dots.length > targetDotCount) {
                dots.pop();
            }
            
            dots.forEach(dot => {
                dot.update();
                dot.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        inputElement.addEventListener('input', (e) => {
            const val = e.target.value.replace('.', '');
            let correctCount = 0;
            let isError = false;

            for (let i = 0; i < val.length; i++) {
                if (val[i] === pi[i]) {
                    correctCount++;
                } else {
                    isError = true;
                    break;
                }
            }

            if (isError) {
                targetDotCount = 0; 
                inputElement.classList.add('panic');
                status.innerText = "!!! ERROR !!!";
            } else {
                targetDotCount = correctCount;
                inputElement.classList.remove('panic');
                status.innerText = `IMAGES: ${correctCount}`;
            }
        });
    </script>
</body>
</html>
