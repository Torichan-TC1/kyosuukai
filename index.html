<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Reflection Dots</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden; /* スクロール禁止 */
            user-select: none;
        }

        /* ドットを描画する背景キャンバス */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 入力欄などのコンテンツ */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.6); /* 粒で見えなくならないよう背景を少し暗く */
            padding: 20px;
            border-radius: 20px;
        }

        input {
            background: #222;
            border: 2px solid #444;
            color: #0f0;
            font-size: 28px;
            padding: 15px;
            text-align: center;
            width: 80%;
            max-width: 300px;
            border-radius: 10px;
            outline: none;
        }

        .status {
            margin-top: 20px;
            color: #0f0;
            font-weight: bold;
            text-shadow: 0 0 10px #000;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="content">
        <p>円周率を入力せよ。<br>正解するほど「点」が生まれる。</p>
        <input type="number" id="piInput" placeholder="3.1415..." onpaste="return false;" autocomplete="off">
        <div class="status" id="status">DOTS: 0</div>
    </div>

    <script>
        const pi = "31415926535897932384626433832795028841971693993751";
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const inputElement = document.getElementById('piInput');
        const status = document.getElementById('status');

        let dots = [];
        let targetDotCount = 0;

        // キャンバスサイズ設定
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ドットのクラス
        class Dot {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = 3 + Math.random() * 4;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // 壁での反射
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
            }
        }

        // アニメーションループ
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 目標の数に合わせてドットを増減
            if (dots.length < targetDotCount) {
                dots.push(new Dot());
            } else if (dots.length > targetDotCount) {
                dots.pop();
            }

            dots.forEach(dot => {
                dot.update();
                dot.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // 入力判定
        inputElement.addEventListener('input', (e) => {
            const val = e.target.value.replace('.', '');
            let correctCount = 0;
            let isError = false;

            for (let i = 0; i < val.length; i++) {
                if (val[i] === pi[i]) {
                    correctCount++;
                } else {
                    isError = true;
                    break;
                }
            }

            if (isError) {
                targetDotCount = 0; // 間違えたら全消去
                status.innerText = "DOTS: 0 (ERROR)";
                inputElement.style.borderColor = "red";
            } else {
                targetDotCount = correctCount; // 正解数＝ドット数
                status.innerText = `DOTS: ${correctCount}`;
                inputElement.style.borderColor = "#444";
            }
        });
    </script>
</body>
</html>
