<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Light Up - Hard Mode</title>
    <style>
        body {
            background-color: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
            /* スマホでのテキスト選択を禁止 */
            user-select: none;
            -webkit-user-select: none;
        }

        .bulb {
            width: 100px;
            height: 100px;
            background-color: #fffb00;
            border-radius: 50%;
            margin-bottom: 50px;
            box-shadow: 0 0 calc(var(--bright) * 10px) calc(var(--bright) * 2px) #fffb00;
            transition: box-shadow 0.3s ease;
        }

        input {
            background: #222;
            border: 2px solid #444;
            color: #fffb00;
            font-size: 24px;
            padding: 10px;
            text-align: center;
            width: 80%;
            max-width: 300px;
            border-radius: 10px;
            outline: none;
            /* 入力欄自体のコピーも禁止 */
            -webkit-user-select: auto; 
            user-select: auto;
        }

        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body style="--bright: 0;">

    <div class="bulb" id="bulb"></div>
    <p>円周率を<strong>手入力</strong>して光らせろ！</p>
    
    <input type="number" id="piInput" 
           placeholder="3.1415..." 
           onpaste="return false;" 
           oncontextmenu="return false;" 
           autocomplete="off">

    <div class="status" id="status">現在: 0 桁正解 (貼り付け不可)</div>

    <script>
        const pi = "3141592653589793238462643383279";
        const inputElement = document.getElementById('piInput');
        const bulb = document.getElementById('bulb');
        const status = document.getElementById('status');

        // 念のためJavaScript側でもペーストイベントをブロック
        inputElement.addEventListener('paste', (e) => {
            e.preventDefault();
            alert("ズルは禁止です！手で入力してください。");
        });

        inputElement.addEventListener('input', (e) => {
            const val = e.target.value.replace('.', '');
            let correctCount = 0;

            for (let i = 0; i < val.length; i++) {
                if (val[i] === pi[i]) {
                    correctCount++;
                } else {
                    break;
                }
            }

            document.body.style.setProperty('--bright', correctCount * 5);
            status.innerText = `現在: ${correctCount} 桁正解`;

            if (val.length > correctCount) {
                bulb.style.backgroundColor = '#ff4444';
            } else {
                bulb.style.backgroundColor = '#fffb00';
            }
        });
    </script>
</body>
</html>
