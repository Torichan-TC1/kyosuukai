<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Light Up - Penalty Mode</title>
    <style>
        body {
            background-color: #050505; /* より真っ黒に */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.5s ease;
        }

        /* 電球本体 */
        .bulb {
            width: 100px;
            height: 100px;
            background-color: #fffb00;
            border-radius: 50%;
            margin-bottom: 50px;
            /* 通常の光（黄色） */
            box-shadow: 0 0 calc(var(--bright) * 8px) calc(var(--bright) * 1px) #fffb00,
                        0 0 calc(var(--bright) * 15px) calc(var(--bright) * 3px) #fffec0;
            transition: box-shadow 0.2s ease, background-color 0.2s ease;
            position: relative;
        }

        /* 間違えた時の赤い影（通常は透明） */
        .bulb.error {
            background-color: #550000; /* 濁った赤 */
            box-shadow: 0 0 15px 5px #ff0000; /* 暗い赤 */
            animation: flicker 0.1s infinite; /* 高速点滅 */
        }

        /* 間違えた時のチカチカするアニメーション */
        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        input {
            background: #1a1a1a;
            border: 2px solid #333;
            color: #fffb00;
            font-size: 24px;
            padding: 10px;
            text-align: center;
            width: 80%;
            max-width: 300px;
            border-radius: 10px;
            outline: none;
            -webkit-user-select: auto; 
            user-select: auto;
            transition: border-color 0.3s ease;
        }
        
        input.error-input {
            border-color: #ff0000;
            color: #ff0000;
        }

        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body style="--bright: 0;">

    <div class="bulb" id="bulb"></div>
    <p>円周率を手入力しろ！間違いは許されん</p>
    
    <input type="number" id="piInput" 
           placeholder="3.1415..." 
           onpaste="return false;" 
           oncontextmenu="return false;" 
           autocomplete="off">

    <div class="status" id="status">現在: 0 桁正解</div>

    <script>
        const pi = "3141592653589793238462643383279";
        const inputElement = document.getElementById('piInput');
        const bulb = document.getElementById('bulb');
        const status = document.getElementById('status');

        inputElement.addEventListener('paste', (e) => {
            e.preventDefault();
        });

        inputElement.addEventListener('input', (e) => {
            const val = e.target.value.replace('.', '');
            let correctCount = 0;

            // 判定ロジック
            let isError = false;
            for (let i = 0; i < val.length; i++) {
                if (val[i] === pi[i]) {
                    correctCount++;
                } else {
                    isError = true; // 途中で間違えた
                    break;
                }
            }

            // 演出の切り替え
            if (isError) {
                // 【ペナルティ】暗く、赤く、点滅
                document.body.style.setProperty('--bright', 0); // 通常の明かりを消す
                bulb.classList.add('error'); // 赤い点滅スタイルを適用
                inputElement.classList.add('error-input');
                document.body.style.backgroundColor = '#100000'; // 背景も少し赤く
                status.innerText = `間違い検出！現在: ${correctCount} 桁まで合ってた`;
            } else {
                // 【正解】明るくしていく
                document.body.style.setProperty('--bright', correctCount * 6);
                bulb.classList.remove('error'); // 通常スタイルに戻す
                inputElement.classList.remove('error-input');
                document.body.style.backgroundColor = '#050505';
                status.innerText = `現在: ${correctCount} 桁正解`;
            }
        });
    </script>
</body>
</html>
