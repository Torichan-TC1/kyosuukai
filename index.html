<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Reflection Dots - Panic Mode</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 20px;
        }

        input {
            background: #111;
            border: 2px solid #444;
            color: #0f0;
            font-size: 32px;
            padding: 15px;
            text-align: center;
            width: 80%;
            max-width: 320px;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s ease;
        }

        /* 【新機能】間違えた時の赤点滅アニメーション */
        input.panic {
            color: #ff0000 !important;
            border-color: #ff0000 !important;
            box-shadow: 0 0 20px #ff0000;
            animation: blink 0.2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .status {
            margin-top: 20px;
            font-weight: bold;
            color: #888;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="content">
        <p>円周率を入力せよ。<br>ミスは赤点滅で裁かれる。</p>
        <input type="number" id="piInput" placeholder="3.1415..." onpaste="return false;" autocomplete="off">
        <div class="status" id="status">DOTS: 0</div>
    </div>

    <script>
        const pi = "31415926535897932384626433832795028841971693993751";
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const inputElement = document.getElementById('piInput');
        const status = document.getElementById('status');

        let dots = [];
        let targetDotCount = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Dot {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = 3 + Math.random() * 4;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (dots.length < targetDotCount) {
                dots.push(new Dot());
            } else if (dots.length > targetDotCount) {
                dots.pop();
            }
            dots.forEach(dot => {
                dot.update();
                dot.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        inputElement.addEventListener('input', (e) => {
            const val = e.target.value.replace('.', '');
            let correctCount = 0;
            let isError = false;

            for (let i = 0; i < val.length; i++) {
                if (val[i] === pi[i]) {
                    correctCount++;
                } else {
                    isError = true;
                    break;
                }
            }

            if (isError) {
                targetDotCount = 0; 
                inputElement.classList.add('panic'); // 赤点滅クラスを追加
                status.innerText = "!!! ERROR !!!";
            } else {
                targetDotCount = correctCount;
                inputElement.classList.remove('panic'); // 正常ならクラスを削除
                status.innerText = `DOTS: ${correctCount}`;
            }
        });
    </script>
</body>
</html>
